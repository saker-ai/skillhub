name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME}
          BINARY=skillhub
          if [ "$GOOS" = "windows" ]; then
            BINARY=skillhub.exe
          fi
          go build -ldflags "-s -w -X main.version=${VERSION}" -o ${BINARY} ./cmd/skillhub/

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCHIVE_NAME=skillhub-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}

          mkdir -p dist/${ARCHIVE_NAME}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp skillhub.exe dist/${ARCHIVE_NAME}/
          else
            cp skillhub dist/${ARCHIVE_NAME}/
          fi
          cp -r configs dist/${ARCHIVE_NAME}/
          cp LICENSE dist/${ARCHIVE_NAME}/

          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r ${ARCHIVE_NAME}.zip ${ARCHIVE_NAME}
          else
            tar czf ${ARCHIVE_NAME}.tar.gz ${ARCHIVE_NAME}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillhub-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/skillhub-*.*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
