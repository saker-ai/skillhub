        "200": { $ref: "#/components/responses/MessageOK" }

  /api/v1/admin/tokens:
    post:
      tags: [Admin]
      summary: Mint a token on behalf of any user
      security: [{ BearerAuth: [] }, { CookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: string, format: uuid }
