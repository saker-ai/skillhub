        "200":
          description: Token
          content: { application/json: { schema: { $ref: "#/components/schemas/TokenCreateResponse" } } }

  /api/v1/admin/skills:
    get:
      tags: [Admin]
      summary: List all skills (any visibility)
      security: [{ BearerAuth: [] }, { CookieAuth: [] }]
      parameters:
        - { name: visibility, in: query, schema: { type: string, enum: [public, private, pending] } }
        - { name: cursor,     in: query, schema: { type: string } }
        - { name: limit,      in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        "200":
          description: Skills
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:       { type: array, items: { $ref: "#/components/schemas/Skill" } }
                  nextCursor: { type: string, nullable: true }

  /api/v1/admin/skills/{slug}/review:
    parameters: [{ name: slug, in: path, required: true, schema: { type: string } }]
    post:
      tags: [Admin]
      summary: Approve or reject a public-visibility request
