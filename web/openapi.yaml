        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:       { type: array, items: { $ref: "#/components/schemas/Comment" } }
                  nextCursor: { type: string, nullable: true }
    post:
      tags: [Comments]
      summary: Post a comment
      security: [{ BearerAuth: [] }, { CookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        "200": { description: Created comment, content: { application/json: { schema: { $ref: "#/components/schemas/Comment" } } } }

  /api/v1/comments/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
