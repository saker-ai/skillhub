        - { name: cursor,     in: query, schema: { type: string } }
        - { name: limit,      in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        "200":
          description: Plugins
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:       { type: array, items: { $ref: "#/components/schemas/Plugin" } }
                  nextCursor: { type: string, nullable: true }

  /api/v1/admin/plugins/{slug}/review:
    parameters: [{ name: slug, in: path, required: true, schema: { type: string } }]
    post:
      tags: [Admin]
      summary: Approve or reject a plugin
      security: [{ BearerAuth: [] }, { CookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [approve, reject] }
      responses:
        "200": { $ref: "#/components/responses/MessageOK" }

  /api/v1/admin/plugins/{slug}/visibility:
    parameters: [{ name: slug, in: path, required: true, schema: { type: string } }]
    post:
      tags: [Admin]
      summary: Force-set a plugin's visibility
      security: [{ BearerAuth: [] }, { CookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visibility]
              properties:
                visibility: { type: string, enum: [public, private] }
      responses:
        "200": { $ref: "#/components/responses/MessageOK" }

  /api/v1/admin/audit-logs:
    get:
      tags: [Admin]
      summary: List audit log entries
      security: [{ BearerAuth: [] }, { CookieAuth: [] }]
      parameters:
        - { name: cursor, in: query, schema: { type: string } }
        - { name: limit,  in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        "200":
          description: Audit log
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ──────────────────────────────────────────────────────────────────
  # Agent provisioning + webhooks
  # ──────────────────────────────────────────────────────────────────
  /api/v1/agent/provision:
    post:
      tags: [Auth]
      summary: Auto-provision a token for a managed agent
      description: Requires `SKILLHUB_AGENT_SECRET` to be configured server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [handle, secret]
              properties:
                handle: { type: string }
                secret: { type: string }
      responses:
        "200":
          description: Token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/webhooks/github:
    post:
      tags: [Webhooks]
      summary: GitHub push webhook (mirror import)
      responses:
        "200": { $ref: "#/components/responses/MessageOK" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/webhooks/gitlab:
    post:
      tags: [Webhooks]
      summary: GitLab push webhook
      responses:
        "200": { $ref: "#/components/responses/MessageOK" }
  /api/v1/webhooks/gitea:
    post:
      tags: [Webhooks]
      summary: Gitea push webhook
      responses:
        "200": { $ref: "#/components/responses/MessageOK" }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Personal or team token from the device flow / `/api/v1/tokens`. Format is
        opaque; treat it as a secret string. Pass as `Authorization: Bearer <token>`.
    CookieAuth:
      type: apiKey
      in: cookie
      name: session_token
      description: Set by `POST /login` and the OAuth callback. Browser-only.

  responses:
    BadRequest:
      description: Validation error.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unauthorized:
      description: Missing or invalid token.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Forbidden:
      description: Authenticated but not allowed.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFound:
      description: Resource not found.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    MessageOK:
      description: Success.
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
    HealthStatus:
      type: object
      properties:
        status: { type: string }
    ClawHubDescriptor:
      type: object
      properties:
        registryUrl: { type: string, format: uri }
        apiVersion:  { type: string }
        endpoints:
          type: object
          additionalProperties: { type: string }

    User:
      type: object
      properties:
        id:          { type: string, format: uuid }
        handle:      { type: string }
        displayName: { type: string, nullable: true }
        email:       { type: string, nullable: true }
        role:        { type: string, enum: [user, moderator, admin] }
        avatarUrl:   { type: string, nullable: true }
        createdAt:   { type: string, format: date-time }

    Skill:
      type: object
      properties:
        id:            { type: string, format: uuid }
        slug:          { type: string }
        displayName:   { type: string }
        summary:       { type: string }
        description:   { type: string }
        category:      { type: string, nullable: true }
        kind:          { type: string, nullable: true }
        tags:          { type: array, items: { type: string } }
        visibility:    { type: string, enum: [public, private] }
        latestVersion: { type: string }
        downloads:     { type: integer }
        stars:         { type: integer }
        ownerId:       { type: string, format: uuid }
        namespaceId:   { type: string, format: uuid, nullable: true }
        createdAt:     { type: string, format: date-time }
        updatedAt:     { type: string, format: date-time }

    SkillVersion:
      type: object
      properties:
        id:              { type: string, format: uuid }
        skillId:         { type: string, format: uuid }
        version:         { type: string, description: "Semver" }
        changelog:       { type: string }
        fingerprint:     { type: string, description: "SHA-256 hex" }
        signatureBundle: { type: string, nullable: true }
        yankedAt:        { type: string, format: date-time, nullable: true }
        yankReason:      { type: string, nullable: true }
        deprecatedAt:    { type: string, format: date-time, nullable: true }
        deprecateMessage: { type: string, nullable: true }
        dependencies:
          type: array
          items:
            type: object
            properties:
              slug:         { type: string }
              versionRange: { type: string }
        publishedAt:     { type: string, format: date-time }

    Plugin:
      type: object
      properties:
        id:               { type: string, format: uuid }
        slug:             { type: string }
        displayName:      { type: string, nullable: true }
        summary:          { type: string, nullable: true }
        visibility:       { type: string, enum: [public, private] }
        category:         { type: string }
        tags:             { type: array, items: { type: string } }
        downloads:        { type: integer }
        starsCount:       { type: integer }
        versionsCount:    { type: integer }
        ownerHandle:      { type: string }
        latestVersionId:  { type: string, format: uuid, nullable: true }
        moderationStatus: { type: string }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }

    PluginVersion:
      type: object
      properties:
        id:          { type: string, format: uuid }
        pluginId:    { type: string, format: uuid }
        version:     { type: string, description: "Semver" }
        fingerprint: { type: string, description: "SHA-256 hex" }
        changelog:   { type: string, nullable: true }
        sha256Hash:  { type: string }
        manifest:    { type: object, additionalProperties: true, description: "Parsed plugin.json" }
        files:       { type: array, items: { type: object, properties: { path: { type: string }, size: { type: integer }, sha256: { type: string } } } }
        createdBy:   { type: string, format: uuid }
        yankedAt:    { type: string, format: date-time, nullable: true }
        yankReason:  { type: string, nullable: true }
        createdAt:   { type: string, format: date-time }

    APIToken:
      type: object
      properties:
        id:          { type: string, format: uuid }
        userId:      { type: string, format: uuid }
        namespaceId: { type: string, format: uuid, nullable: true }
        label:       { type: string }
        prefix:      { type: string, description: "First 8 chars of the raw token" }
        scope:       { type: string, enum: [full, read, publish] }
        expiresAt:   { type: string, format: date-time, nullable: true }
        lastUsedAt:  { type: string, format: date-time, nullable: true }
        revokedAt:   { type: string, format: date-time, nullable: true }
        createdAt:   { type: string, format: date-time }

    TokenCreateRequest:
      type: object
      properties:
        label:     { type: string }
        scope:     { type: string, enum: [full, read, publish], default: full }
        expiresIn: { type: string, description: "Go duration string, e.g. \"720h\"" }

    TokenCreateResponse:
      type: object
      properties:
        token:    { type: string, description: "Raw token; shown only once — store immediately." }
        metadata: { $ref: "#/components/schemas/APIToken" }

    Namespace:
      type: object
      properties:
        id:          { type: string, format: uuid }
        slug:        { type: string }
        displayName: { type: string }
        description: { type: string }
        type:        { type: string, enum: [personal, team] }
        ownerId:     { type: string, format: uuid }
        createdAt:   { type: string, format: date-time }

    NamespaceCreateRequest:
      type: object
      required: [slug]
      properties:
        slug:        { type: string }
        displayName: { type: string }
        description: { type: string }
        type:        { type: string, enum: [personal, team], default: team }

    NamespaceMember:
      type: object
      properties:
        userId:    { type: string, format: uuid }
        handle:    { type: string }
        role:      { type: string, enum: [owner, admin, member] }
        joinedAt:  { type: string, format: date-time }

    Invitation:
      type: object
      properties:
        id:          { type: string, format: uuid }
        namespaceId: { type: string, format: uuid }
        inviterId:   { type: string, format: uuid }
        inviteeId:   { type: string, format: uuid }
        role:        { type: string, enum: [admin, member] }
        message:     { type: string }
        status:      { type: string, enum: [pending, accepted, declined, revoked] }
        createdAt:   { type: string, format: date-time }
        respondedAt: { type: string, format: date-time, nullable: true }

    Comment:
      type: object
      properties:
        id:        { type: string, format: uuid }
        skillId:   { type: string, format: uuid }
        authorId:  { type: string, format: uuid }
        body:      { type: string }
        createdAt: { type: string, format: date-time }

    Rating:
      type: object
      properties:
        userId:    { type: string, format: uuid }
        skillId:   { type: string, format: uuid }
        score:     { type: integer, minimum: 1, maximum: 5 }
        comment:   { type: string }
        createdAt: { type: string, format: date-time }

    Notification:
      type: object
      properties:
        id:        { type: string, format: uuid }
        userId:    { type: string, format: uuid }
        kind:      { type: string }
        payload:   { type: object, additionalProperties: true }
        readAt:    { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    DeviceCodeGrant:
      type: object
      properties:
        deviceCode:      { type: string }
        userCode:        { type: string }
        verificationUri: { type: string, format: uri }
        expiresIn:       { type: integer, description: "Seconds" }
        interval:        { type: integer, description: "Polling interval in seconds" }
